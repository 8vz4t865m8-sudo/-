<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#050508">
<meta name="description" content="Abyss Survivor - 深渊幸存者，一款roguelike生存游戏">
<link rel="manifest" href="manifest.json">
<title>Abyss Survivor</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { width:100%; height:100%; background:#050508; overflow:hidden; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif; touch-action:none; user-select:none; -webkit-user-select:none; }
#game-wrap { position:fixed; top:0; left:0; width:100%; height:100%; background:#050508; z-index:1; }
#gameCanvas { display:block; width:100%; height:100%; background:#080810; }
.layer { position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; display:flex; flex-direction:column; }
.layer > * { pointer-events:auto; }

/* Start Screen */
#start-screen { justify-content:center; align-items:center; background:radial-gradient(ellipse at 50% 40%,#1a0c1a 0%,#050508 65%); z-index:10; }
.logo-wrap { text-align:center; position:relative; margin-bottom:40px; animation:logoFloat 4s ease-in-out infinite; }
@keyframes logoFloat { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-8px);} }
.logo-wrap h1 { font-size:clamp(48px,10vw,84px); font-weight:900; color:#d8c8a8; letter-spacing:12px; text-transform:uppercase; text-shadow:0 0 80px rgba(180,60,60,0.3),0 4px 30px rgba(0,0,0,0.9); }
.logo-wrap .sub { font-size:11px; color:#4a3030; letter-spacing:14px; text-transform:uppercase; margin-top:12px; font-weight:600; }
.divider { width:160px; height:1px; background:linear-gradient(90deg,transparent,#6a2525,transparent); margin:0 auto 32px; position:relative; }
.divider::after { content:''; position:absolute; left:50%; top:50%; width:6px; height:6px; background:#6a2525; transform:translate(-50%,-50%) rotate(45deg); }
.hints { display:flex; flex-direction:column; gap:10px; align-items:center; margin-bottom:40px; }
.hint { font-size:13px; color:#5a4040; display:flex; align-items:center; gap:10px; letter-spacing:0.5px; transition:color 0.3s; }
.hint::before { content:''; width:5px; height:5px; background:#6a2525; border-radius:50%; flex-shrink:0; }
.btn-main { padding:16px 64px; font-size:15px; font-weight:800; color:#d8c8a8; background:linear-gradient(180deg,#241414,#140808); border:1.5px solid rgba(180,140,80,0.25); border-radius:100px; cursor:pointer; letter-spacing:5px; text-transform:uppercase; transition:all 0.3s; box-shadow:0 8px 32px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.04); font-family:inherit; position:relative; overflow:hidden; }
.btn-main::before { content:''; position:absolute; top:0; left:-100%; width:100%; height:100%; background:linear-gradient(90deg,transparent,rgba(255,255,255,0.06),transparent); transition:left 0.5s; }
.btn-main:hover::before { left:100%; }
.btn-main:hover { border-color:rgba(180,140,80,0.6); transform:translateY(-2px); box-shadow:0 12px 40px rgba(180,40,40,0.15); }
.btn-main:active { transform:translateY(1px) scale(0.97); }

/* HUD */
#hud { display:none; padding:12px 16px; justify-content:space-between; align-items:flex-start; z-index:5; }
.hud-card { background:rgba(6,4,8,0.75); backdrop-filter:blur(20px) saturate(1.2); border:1px solid rgba(180,140,80,0.08); border-radius:16px; padding:10px 14px; box-shadow:0 8px 32px rgba(0,0,0,0.4); }
.bar-line { display:flex; align-items:center; gap:6px; margin-bottom:5px; }
.bar-line:last-child { margin-bottom:0; }
.bar-icon { width:18px; height:18px; flex-shrink:0; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:10px; }
.bar-track { width:120px; height:6px; background:rgba(0,0,0,0.5); border-radius:3px; overflow:hidden; position:relative; }
.bar-track::after { content:''; position:absolute; top:0; left:0; right:0; bottom:0; border-radius:3px; box-shadow:inset 0 1px 2px rgba(0,0,0,0.5); pointer-events:none; }
.bar-fill { height:100%; border-radius:3px; position:relative; transition:width 0.15s linear; }
.bar-fill::after { content:''; position:absolute; top:0; left:0; right:0; height:50%; background:linear-gradient(180deg,rgba(255,255,255,0.2),transparent); border-radius:3px 3px 0 0; }
.hp-fill { background:linear-gradient(90deg,#5a1515,#c03030); }
.xp-fill { background:linear-gradient(90deg,#251060,#7040c0); }
.bar-num { font-size:10px; color:#6a5050; min-width:40px; font-weight:700; font-variant-numeric:tabular-nums; }
.hud-stats { text-align:right; }
.hud-stats .lbl { font-size:9px; color:#3a2020; text-transform:uppercase; letter-spacing:2px; font-weight:800; }
.hud-stats .num { font-size:24px; font-weight:900; color:#c8b898; font-variant-numeric:tabular-nums; line-height:1; text-shadow:0 2px 12px rgba(0,0,0,0.6); }
.hud-stats .sub { font-size:10px; color:#4a3030; font-weight:600; margin-top:2px; font-variant-numeric:tabular-nums; }

/* Joystick */
#joystick-wrap { display:none; position:absolute; pointer-events:none; z-index:30; }
.joy-base { position:absolute; width:110px; height:110px; border-radius:50%; background:rgba(255,255,255,0.02); border:2px solid rgba(255,255,255,0.08); transform:translate(-50%,-50%); }
.joy-knob { position:absolute; width:44px; height:44px; border-radius:50%; background:rgba(180,60,60,0.15); border:2px solid rgba(180,60,60,0.35); transform:translate(-50%,-50%); box-shadow:0 4px 20px rgba(0,0,0,0.5); }

/* Skill Bar */
#skill-bar { display:none; position:absolute; bottom:16px; right:16px; flex-direction:row; gap:6px; align-items:flex-end; pointer-events:none; flex-wrap:wrap; justify-content:flex-end; max-width:55%; z-index:5; }
.skill-tag { display:flex; align-items:center; gap:5px; padding:4px 10px 4px 4px; background:rgba(6,4,8,0.65); backdrop-filter:blur(12px); border:1px solid rgba(180,140,80,0.08); border-radius:100px; pointer-events:auto; transition:transform 0.15s; }
.skill-tag:hover { transform:scale(1.05); }
.skill-tag canvas { width:24px; height:24px; border-radius:50%; flex-shrink:0; }
.skill-tag .sn { font-size:9px; color:#6a5050; font-weight:700; }
.skill-tag .sl { font-size:8px; color:#8b6914; font-weight:900; margin-left:2px; }

/* Upgrade Screen */
#upgrade-screen { display:none; justify-content:center; align-items:center; background:rgba(3,2,4,0.94); backdrop-filter:blur(8px); z-index:50; }
.upgrade-container { width:92%; max-width:720px; }
.upgrade-title { text-align:center; margin-bottom:28px; }
.upgrade-title h2 { font-size:26px; font-weight:900; color:#c8b898; letter-spacing:5px; text-transform:uppercase; }
.upgrade-title p { font-size:12px; color:#4a3030; margin-top:5px; letter-spacing:1px; }
.upgrade-grid { display:flex; gap:12px; justify-content:center; flex-wrap:wrap; }
.up-card { flex:1; min-width:170px; max-width:210px; background:linear-gradient(165deg,rgba(28,18,24,0.98),rgba(12,6,10,0.98)); border:1.5px solid rgba(180,140,80,0.1); border-radius:18px; padding:20px 16px; cursor:pointer; transition:all 0.25s cubic-bezier(0.4,0,0.2,1); display:flex; flex-direction:column; align-items:center; text-align:center; position:relative; overflow:hidden; box-shadow:0 8px 32px rgba(0,0,0,0.4); }
.up-card::after { content:''; position:absolute; top:0; left:0; right:0; height:3px; background:var(--accent,#5a2020); opacity:0; transition:opacity 0.25s; }
.up-card:hover::after { opacity:1; }
.up-card:hover { transform:translateY(-5px) scale(1.02); border-color:rgba(180,140,80,0.3); box-shadow:0 16px 48px rgba(0,0,0,0.5), 0 0 40px var(--glow,transparent); }
.up-card:active { transform:scale(0.96); }
.up-card .up-img { width:64px; height:64px; margin-bottom:12px; border-radius:14px; background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.05); display:flex; align-items:center; justify-content:center; }
.up-card .up-img canvas { width:44px; height:44px; }
.up-card .up-name { font-size:15px; font-weight:800; color:#c8b898; margin-bottom:3px; }
.up-card .up-lvl { font-size:10px; color:#4a3030; font-weight:600; border:1px solid rgba(60,50,50,0.3); padding:2px 8px; border-radius:100px; display:inline-block; margin-bottom:8px; }
.up-card .up-desc { font-size:11px; color:#5a4040; line-height:1.5; }

/* Game Over */
#gameover-screen { display:none; justify-content:center; align-items:center; background:rgba(4,2,3,0.96); z-index:60; }
.over-wrap { text-align:center; width:90%; max-width:380px; }
.over-title { font-size:clamp(36px,8vw,60px); font-weight:900; color:#8b2020; letter-spacing:6px; text-transform:uppercase; text-shadow:0 0 60px rgba(140,40,40,0.3); margin-bottom:6px; animation:pulseRed 2s ease-in-out infinite; }
@keyframes pulseRed { 0%,100%{opacity:1;} 50%{opacity:0.7;} }
.over-sub { font-size:12px; color:#3a2020; letter-spacing:3px; margin-bottom:32px; }
.over-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:32px; }
.over-cell { background:rgba(14,8,10,0.95); border:1px solid rgba(180,140,80,0.08); border-radius:14px; padding:16px; text-align:left; }
.over-cell .cl { font-size:9px; color:#2a1a1a; text-transform:uppercase; letter-spacing:2px; font-weight:800; margin-bottom:5px; }
.over-cell .cv { font-size:22px; font-weight:900; color:#c8b898; font-variant-numeric:tabular-nums; }

/* Wave Banner */
#wave-banner { position:absolute; top:40%; left:50%; transform:translate(-50%,-50%); pointer-events:none; text-align:center; display:none; z-index:40; }
.wave-txt { font-size:clamp(48px,12vw,72px); font-weight:900; color:#c8b898; text-shadow:0 0 60px rgba(180,60,60,0.2); letter-spacing:8px; text-transform:uppercase; opacity:0; }

/* Cheat Panel */
#cheat-panel { display:none; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:320px; background:rgba(10,6,10,0.96); border:1px solid rgba(180,140,80,0.15); border-radius:18px; padding:22px; z-index:100; box-shadow:0 16px 60px rgba(0,0,0,0.8); }
#cheat-panel h3 { font-size:15px; color:#c8b898; text-align:center; margin-bottom:18px; letter-spacing:3px; text-transform:uppercase; font-weight:800; }
.cheat-row { display:flex; justify-content:space-between; align-items:center; padding:9px 0; border-bottom:1px solid rgba(255,255,255,0.04); }
.cheat-row:last-child { border-bottom:none; }
.cheat-row span { font-size:11px; color:#5a4040; font-weight:600; }
.cheat-btn { padding:5px 14px; font-size:10px; font-weight:700; color:#d4b896; background:#1a0f0f; border:1px solid rgba(180,140,80,0.2); border-radius:6px; cursor:pointer; letter-spacing:1px; text-transform:uppercase; font-family:inherit; transition:all 0.2s; }
.cheat-btn:hover { border-color:rgba(180,140,80,0.5); background:#251515; }
.cheat-btn.on { color:#40c870; border-color:rgba(64,200,112,0.35); }
.cheat-close { display:block; width:100%; margin-top:16px; padding:10px; font-size:11px; color:#4a3030; background:transparent; border:1px solid rgba(60,50,50,0.3); border-radius:8px; cursor:pointer; font-family:inherit; transition:all 0.2s; }
.cheat-close:hover { color:#c8b898; border-color:rgba(180,140,80,0.3); }
#cheat-toggle { position:absolute; top:12px; right:12px; width:36px; height:36px; border-radius:50%; background:rgba(8,6,10,0.6); border:1px solid rgba(180,140,80,0.1); color:#4a3030; font-size:16px; cursor:pointer; display:none; align-items:center; justify-content:center; z-index:90; backdrop-filter:blur(8px); transition:all 0.2s; }
#cheat-toggle:hover { color:#c8b898; border-color:rgba(180,140,80,0.3); }

/* Damage numbers animation */
@keyframes floatUp { 0%{opacity:1;transform:translateY(0);} 100%{opacity:0;transform:translateY(-30px);} }

/* Loading overlay */
#loading { position:fixed; top:0; left:0; width:100%; height:100%; background:#050508; z-index:200; display:flex; justify-content:center; align-items:center; flex-direction:column; gap:16px; }
#loading .load-bar { width:120px; height:3px; background:rgba(255,255,255,0.05); border-radius:2px; overflow:hidden; }
#loading .load-fill { width:0%; height:100%; background:linear-gradient(90deg,#5a2020,#c84040); border-radius:2px; animation:loadAnim 1.5s ease-in-out infinite; }
@keyframes loadAnim { 0%{width:0%;margin-left:0;} 50%{width:100%;margin-left:0;} 100%{width:0%;margin-left:100%;} }
#loading .load-text { font-size:11px; color:#3a2828; letter-spacing:4px; text-transform:uppercase; }
</style>
</head>
<body>
<div id="loading">
  <div class="load-bar"><div class="load-fill"></div></div>
  <div class="load-text">Loading</div>
</div>

<div id="game-wrap">
  <canvas id="gameCanvas"></canvas>
  <button id="cheat-toggle">&#9881;</button>

  <div id="hud" class="layer">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;width:100%;">
      <div class="hud-card">
        <div class="bar-line">
          <div class="bar-icon" style="background:rgba(160,40,40,0.15);color:#c04040;">&#9829;</div>
          <div class="bar-track"><div id="hp-bar" class="bar-fill hp-fill" style="width:100%"></div></div>
          <span id="hp-text" class="bar-num">100/100</span>
        </div>
        <div class="bar-line">
          <div class="bar-icon" style="background:rgba(80,40,160,0.15);color:#7040c0;">&#10022;</div>
          <div class="bar-track" style="width:100px;"><div id="xp-bar" class="bar-fill xp-fill" style="width:0%"></div></div>
          <span id="lvl-text" class="bar-num" style="color:#6040a0;">Lv.1</span>
        </div>
      </div>
      <div class="hud-card hud-stats">
        <div class="lbl">WAVE</div>
        <div id="wave-hud" class="num">1</div>
        <div id="time-hud" class="sub">00:00</div>
        <div id="kill-hud" class="sub">KILLS 0</div>
      </div>
    </div>
  </div>

  <div id="joystick-wrap">
    <div class="joy-base" id="joy-base"></div>
    <div class="joy-knob" id="joy-knob"></div>
  </div>

  <div id="skill-bar"></div>

  <div id="wave-banner"><div class="wave-txt" id="wave-banner-text">WAVE 1</div></div>

  <div id="start-screen" class="layer">
    <div class="logo-wrap">
      <h1>深渊幸存者</h1>
      <div class="sub">Abyss Survivor</div>
    </div>
    <div class="divider"></div>
    <div class="hints">
      <div class="hint">拖动屏幕移动角色</div>
      <div class="hint">自动索敌攻击</div>
      <div class="hint">收集灵魂碎片升级</div>
      <div class="hint">按 ~ 键打开开发者面板</div>
    </div>
    <button id="start-btn" class="btn-main">进入深渊</button>
  </div>

  <div id="upgrade-screen" class="layer">
    <div class="upgrade-container">
      <div class="upgrade-title">
        <h2>力量觉醒</h2>
        <p>选择一项强化你的能力</p>
      </div>
      <div class="upgrade-grid" id="upgrade-grid"></div>
    </div>
  </div>

  <div id="gameover-screen" class="layer">
    <div class="over-wrap">
      <div class="over-title">已陨落</div>
      <div class="over-sub">深渊吞噬了你的灵魂</div>
      <div class="over-grid" id="over-grid"></div>
      <button id="restart-btn" class="btn-main">再次挑战</button>
    </div>
  </div>

  <div id="cheat-panel">
    <h3>开发者面板</h3>
    <div class="cheat-row"><span>无敌模式</span><button class="cheat-btn" data-cheat="god">开启</button></div>
    <div class="cheat-row"><span>一击必杀</span><button class="cheat-btn" data-cheat="oneshot">开启</button></div>
    <div class="cheat-row"><span>经验倍率</span><button class="cheat-btn" data-cheat="xpmult">10x</button></div>
    <div class="cheat-row"><span>等级 +10</span><button class="cheat-btn" data-cheat="levelup">+10</button></div>
    <div class="cheat-row"><span>跳至波次</span><button class="cheat-btn" data-cheat="wave">+5</button></div>
    <div class="cheat-row"><span>重置冷却</span><button class="cheat-btn" data-cheat="cooldown">重置</button></div>
    <div class="cheat-row"><span>满血恢复</span><button class="cheat-btn" data-cheat="heal">恢复</button></div>
    <button class="cheat-close" id="cheat-close">关闭面板</button>
  </div>
</div>

<script>
(function(){
"use strict";

// ==================== CONFIG ====================
var WORLD_W = 8000, WORLD_H = 8000;
var DPR = Math.min(window.devicePixelRatio || 1, 2);
var MAX_ENEMIES = 150, MAX_PARTICLES = 500, MAX_XP = 250;
var GRID_SIZE = 200; // spatial hash grid size

// ==================== DOM REFS ====================
var canvas = document.getElementById("gameCanvas");
var ctx = canvas.getContext("2d");
var loadingEl = document.getElementById("loading");

var screens = {
  start: document.getElementById("start-screen"),
  hud: document.getElementById("hud"),
  over: document.getElementById("gameover-screen"),
  upgrade: document.getElementById("upgrade-screen"),
  joystick: document.getElementById("joystick-wrap"),
  skillbar: document.getElementById("skill-bar"),
  waveBanner: document.getElementById("wave-banner"),
  cheatPanel: document.getElementById("cheat-panel"),
  cheatToggle: document.getElementById("cheat-toggle")
};
var joyBase = document.getElementById("joy-base");
var joyKnob = document.getElementById("joy-knob");

// ==================== STATE ====================
var W = 0, H = 0;
var running = false, paused = false, gameTime = 0, kills = 0, wave = 1;
var lastTime = 0, frameCount = 0, screenShake = 0;
var camX = WORLD_W / 2, camY = WORLD_H / 2;
var globalTime = 0;
var loopId = null;

var cheats = { god: false, oneshot: false, xpmult: 1 };

var player = {
  x: WORLD_W / 2, y: WORLD_H / 2, r: 16,
  hp: 120, maxHp: 120, speed: 3.4, level: 1,
  xp: 0, xpToNext: 50, atk: 16, atkSpd: 700, range: 260,
  projCount: 1, pierce: 0, critChance: 0.06, critDmg: 2.3,
  regen: 0, regenTimer: 0, magnetRange: 120, invincible: 0,
  skills: {}, facing: 0, walkCycle: 0,
  // new: weapon system
  weapon: 'sword', weapons: { sword: true },
  combo: 0, comboTimer: 0
};

var enemies = [], bullets = [], xpOrbs = [], particles = [], floatTexts = [];
var waveTimer = 0, waveDuration = 50000, spawnTimer = 0;
var joyActive = false, joyID = null, joyBaseX = 0, joyBaseY = 0, joyDX = 0, joyDY = 0;
var joyMax = 40;
var keys = {};
var mouseJoy = false;
var lastAtk = 0;

// Object pools
var pool = {
  particles: [], bullets: [], xpOrbs: [], floatTexts: []
};

// Spatial hash for collision
var spatialGrid = {};

// ==================== UTILS ====================
function rand(a, b) { return Math.random() * (b - a) + a; }
function dist(a, b) { var dx = a.x - b.x, dy = a.y - b.y; return Math.sqrt(dx * dx + dy * dy); }
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
function angleBetween(a, b) { return Math.atan2(b.y - a.y, b.x - a.x); }
function formatTime(ms) {
  var s = Math.floor(ms / 1000);
  return String(Math.floor(s / 60)).padStart(2, "0") + ":" + String(s % 60).padStart(2, "0");
}
function lerp(a, b, t) { return a + (b - a) * t; }

// ==================== RESIZE ====================
function resize() {
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W * DPR;
  canvas.height = H * DPR;
  canvas.style.width = W + "px";
  canvas.style.height = H + "px";
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
resize();
window.addEventListener("resize", resize);

function getPos(cx, cy) {
  var rect = canvas.getBoundingClientRect();
  return {
    x: (cx - rect.left) * (W / Math.max(rect.width, 1)),
    y: (cy - rect.top) * (H / Math.max(rect.height, 1))
  };
}

// ==================== SPATIAL HASH ====================
function clearGrid() { spatialGrid = {}; }
function gridKey(x, y) {
  return Math.floor(x / GRID_SIZE) + "," + Math.floor(y / GRID_SIZE);
}
function addToGrid(e) {
  var key = gridKey(e.x, e.y);
  if (!spatialGrid[key]) spatialGrid[key] = [];
  spatialGrid[key].push(e);
}
function getNearby(x, y, radius) {
  var results = [];
  var rCells = Math.ceil(radius / GRID_SIZE);
  var cx = Math.floor(x / GRID_SIZE);
  var cy = Math.floor(y / GRID_SIZE);
  for (var i = -rCells; i <= rCells; i++) {
    for (var j = -rCells; j <= rCells; j++) {
      var key = (cx + i) + "," + (cy + j);
      if (spatialGrid[key]) results = results.concat(spatialGrid[key]);
    }
  }
  return results;
}

// ==================== POOLING ====================
function getParticle() {
  return pool.particles.length > 0 ? pool.particles.pop() : {};
}
function freeParticle(p) { if (pool.particles.length < 200) pool.particles.push(p); }

function getBullet() {
  return pool.bullets.length > 0 ? pool.bullets.pop() : {};
}
function freeBullet(b) { if (pool.bullets.length < 100) pool.bullets.push(b); }

function getXpOrb() {
  return pool.xpOrbs.length > 0 ? pool.xpOrbs.pop() : {};
}
function freeXpOrb(o) { if (pool.xpOrbs.length < 100) pool.xpOrbs.push(o); }

function getFloatText() {
  return pool.floatTexts.length > 0 ? pool.floatTexts.pop() : {};
}
function freeFloatText(t) { if (pool.floatTexts.length < 50) pool.floatTexts.push(t); }

var Tex = {
  cache: {},
  skill: function(id, color) {
    var k = "sk_" + id + "_" + color;
    if (this.cache[k]) return this.cache[k];
    var s = 128, c = document.createElement("canvas");
    c.width = s; c.height = s;
    var x = c.getContext("2d");
    var h = s / 2;
    var bg = x.createRadialGradient(h, h, 0, h, h, h);
    bg.addColorStop(0, color + "20");
    bg.addColorStop(1, color + "05");
    x.fillStyle = bg; x.fillRect(0, 0, s, s);
    x.strokeStyle = color + "50"; x.lineWidth = 3;
    x.beginPath(); x.arc(h, h, h - 6, 0, Math.PI * 2); x.stroke();
    x.strokeStyle = color + "25"; x.lineWidth = 1;
    x.beginPath(); x.arc(h, h, h - 2, 0, Math.PI * 2); x.stroke();
    x.strokeStyle = color; x.fillStyle = color;
    x.lineCap = "round"; x.lineJoin = "round";
    switch (id) {
      case "power": {
        x.lineWidth = 5; x.save(); x.translate(h, h); x.rotate(0.35);
        x.beginPath(); x.moveTo(-14, -18); x.lineTo(14, 18); x.stroke();
        x.beginPath(); x.moveTo(14, -18); x.lineTo(-14, 18); x.stroke();
        x.fillStyle = color; x.beginPath(); x.arc(0, 0, 5, 0, Math.PI * 2); x.fill();
        x.fillStyle = "#5a3520"; x.fillRect(-16, -20, 4, 6); x.fillRect(12, -20, 4, 6);
        x.restore(); break;
      }
      case "swift": {
        x.lineWidth = 3; x.strokeStyle = color + "dd";
        for (var i = -1; i <= 1; i++) {
          x.beginPath(); x.moveTo(h - 20, h + i * 14);
          x.quadraticCurveTo(h, h + i * 14 - 8, h + 16, h + i * 14); x.stroke();
          x.beginPath(); x.moveTo(h + 10, h + i * 14 - 5); x.lineTo(h + 16, h + i * 14); x.lineTo(h + 10, h + i * 14 + 5); x.stroke();
        } break;
      }
      case "rapid": {
        x.fillStyle = color;
        for (var i2 = 0; i2 < 3; i2++) {
          x.save(); x.translate(h, h); x.rotate((i2 - 1) * 0.3);
          x.beginPath(); x.moveTo(0, -18); x.lineTo(4, 10); x.lineTo(0, 6); x.lineTo(-4, 10); x.closePath(); x.fill(); x.restore();
        } break;
      }
      case "range": {
        x.lineWidth = 4; x.beginPath(); x.arc(h, h, 22, 0, Math.PI * 2); x.stroke();
        x.beginPath(); x.arc(h, h, 10, 0, Math.PI * 2); x.stroke();
        x.beginPath(); x.moveTo(h - 28, h); x.lineTo(h + 28, h); x.stroke();
        x.beginPath(); x.moveTo(h, h - 28); x.lineTo(h, h + 28); x.stroke();
        x.fillStyle = color; x.beginPath(); x.arc(h, h, 4, 0, Math.PI * 2); x.fill(); break;
      }
      case "multishot": {
        x.lineWidth = 3;
        for (var i3 = -1; i3 <= 1; i3++) {
          x.save(); x.translate(h, h); x.rotate(i3 * 0.4);
          x.beginPath(); x.moveTo(0, -22); x.lineTo(0, 14); x.stroke();
          x.beginPath(); x.moveTo(-5, 10); x.lineTo(0, 16); x.lineTo(5, 10); x.stroke(); x.restore();
        } break;
      }
      case "pierce": {
        x.lineWidth = 4; x.save(); x.translate(h, h);
        x.beginPath(); x.moveTo(0, -26); x.lineTo(0, 18); x.stroke();
        x.fillStyle = color; x.beginPath(); x.moveTo(0, -26); x.lineTo(6, -14); x.lineTo(-6, -14); x.closePath(); x.fill();
        x.fillStyle = "#5a3520"; x.fillRect(-3, 16, 6, 8); x.restore(); break;
      }
      case "vamp": {
        x.fillStyle = color;
        x.beginPath(); x.moveTo(h - 10, h - 8); x.quadraticCurveTo(h - 14, h + 10, h - 4, h + 14); x.quadraticCurveTo(h - 2, h + 4, h - 10, h - 8); x.fill();
        x.beginPath(); x.moveTo(h + 10, h - 8); x.quadraticCurveTo(h + 14, h + 10, h + 4, h + 14); x.quadraticCurveTo(h + 2, h + 4, h + 10, h - 8); x.fill();
        x.fillStyle = "#ff3333"; x.beginPath(); x.arc(h, h + 8, 3, 0, Math.PI * 2); x.fill(); break;
      }
      case "regen": {
        x.lineWidth = 7; x.strokeStyle = color;
        x.beginPath(); x.moveTo(h, h - 18); x.lineTo(h, h + 18); x.stroke();
        x.beginPath(); x.moveTo(h - 18, h); x.lineTo(h + 18, h); x.stroke();
        x.lineWidth = 2; x.strokeStyle = "#40c870"; x.beginPath(); x.arc(h, h, 10, 0, Math.PI * 2); x.stroke(); break;
      }
      case "fortify": {
        x.lineWidth = 3; x.strokeStyle = color;
        x.beginPath(); x.moveTo(h, h - 24); x.lineTo(h + 20, h - 12); x.lineTo(h + 20, h + 4);
        x.quadraticCurveTo(h + 20, h + 18, h, h + 24); x.quadraticCurveTo(h - 20, h + 18, h - 20, h + 4);
        x.lineTo(h - 20, h - 12); x.closePath(); x.stroke();
        x.fillStyle = color + "35"; x.fill();
        for (var i4 = -1; i4 <= 1; i4++) { x.beginPath(); x.moveTo(h + i4 * 8, h - 6); x.lineTo(h + i4 * 8, h + 10); x.stroke(); }
        break;
      }
      case "explode": {
        x.fillStyle = color;
        for (var i5 = 0; i5 < 8; i5++) {
          var a = (i5 / 8) * Math.PI * 2;
          x.beginPath(); x.moveTo(h + Math.cos(a) * 6, h + Math.sin(a) * 6);
          x.lineTo(h + Math.cos(a) * 22, h + Math.sin(a) * 22);
          x.lineTo(h + Math.cos(a + 0.4) * 8, h + Math.sin(a + 0.4) * 8); x.fill();
        }
        var g = x.createRadialGradient(h, h, 0, h, h, 10);
        g.addColorStop(0, "#ffdd33"); g.addColorStop(1, "transparent");
        x.fillStyle = g; x.beginPath(); x.arc(h, h, 10, 0, Math.PI * 2); x.fill(); break;
      }
      case "crit": {
        x.lineWidth = 4; x.fillStyle = color;
        x.beginPath(); x.moveTo(h - 4, h - 20); x.lineTo(h + 8, h - 2); x.lineTo(h - 2, h - 2);
        x.lineTo(h + 4, h + 20); x.lineTo(h - 8, h + 2); x.lineTo(h + 2, h + 2); x.closePath(); x.fill();
        x.strokeStyle = "#ffdd33"; x.lineWidth = 2; x.stroke(); break;
      }
      case "frost": {
        x.lineWidth = 3; x.strokeStyle = color;
        for (var i6 = 0; i6 < 6; i6++) {
          var a2 = (i6 / 6) * Math.PI * 2; x.save(); x.translate(h, h); x.rotate(a2);
          x.beginPath(); x.moveTo(0, -22); x.lineTo(0, 22); x.stroke();
          x.beginPath(); x.moveTo(0, -12); x.lineTo(-5, -18); x.stroke();
          x.beginPath(); x.moveTo(0, -12); x.lineTo(5, -18); x.stroke(); x.restore();
        }
        x.fillStyle = color + "70"; x.beginPath(); x.arc(h, h, 6, 0, Math.PI * 2); x.fill(); break;
      }
      case "magnet": {
        x.strokeStyle = color; x.lineWidth = 2.5;
        for (var r = 8; r < 26; r += 6) { x.beginPath(); x.arc(h, h, r, 0, Math.PI * 1.5); x.stroke(); }
        x.fillStyle = color; x.beginPath(); x.arc(h, h, 4, 0, Math.PI * 2); x.fill(); break;
      }
      case "bounce": {
        x.lineWidth = 4; x.save(); x.translate(h, h);
        x.beginPath(); x.moveTo(-6, -18); x.lineTo(6, -18); x.lineTo(10, 8); x.lineTo(18, 12); x.lineTo(-4, 12); x.closePath();
        x.fillStyle = color; x.fill(); x.fillStyle = "#5a3520"; x.fillRect(-3, 12, 6, 10);
        x.strokeStyle = "#ffdd33"; x.lineWidth = 2; x.beginPath(); x.arc(0, 0, 20, 0.5, 2.5); x.stroke(); x.restore(); break;
      }
      case "giant": {
        x.fillStyle = color;
        x.beginPath(); x.moveTo(h - 12, h + 14); x.lineTo(h - 14, h - 8); x.quadraticCurveTo(h - 14, h - 18, h, h - 22);
        x.quadraticCurveTo(h + 14, h - 18, h + 14, h - 8); x.lineTo(h + 12, h + 14); x.closePath(); x.fill();
        x.fillStyle = "#ffdd33"; x.beginPath(); x.arc(h, h - 4, 4, 0, Math.PI * 2); x.fill(); break;
      }
      case "fire": {
        x.fillStyle = color;
        x.beginPath(); x.moveTo(h, h + 20); x.quadraticCurveTo(h - 16, h + 4, h - 8, h - 12);
        x.quadraticCurveTo(h - 4, h - 4, h, h - 24); x.quadraticCurveTo(h + 4, h - 4, h + 8, h - 12);
        x.quadraticCurveTo(h + 16, h + 4, h, h + 20); x.fill();
        x.fillStyle = "#ffdd33"; x.beginPath(); x.moveTo(h, h + 16); x.lineTo(h - 3, h + 6); x.lineTo(h + 3, h + 6); x.fill(); break;
      }
    }
    this.cache[k] = c; return c;
  }
};

function resetGame() {
  player.x = WORLD_W / 2; player.y = WORLD_H / 2;
  player.hp = 120; player.maxHp = 120; player.level = 1;
  player.xp = 0; player.xpToNext = 50;
  player.atk = 16; player.atkSpd = 700; player.range = 260;
  player.speed = 3.4; player.projCount = 1; player.pierce = 0;
  player.critChance = 0.06; player.critDmg = 2.3;
  player.regen = 0; player.invincible = 0; player.skills = {};
  player.magnetRange = 120; player.r = 16; player.facing = 0; player.walkCycle = 0;
  player.weapon = 'sword'; player.weapons = { sword: true };
  player.combo = 0; player.comboTimer = 0;

  // Return pooled objects
  for (var i = 0; i < enemies.length; i++) { /* enemies not pooled yet */ }
  for (var j = 0; j < bullets.length; j++) freeBullet(bullets[j]);
  for (var k = 0; k < xpOrbs.length; k++) freeXpOrb(xpOrbs[k]);
  for (var m = 0; m < particles.length; m++) freeParticle(particles[m]);
  for (var n = 0; n < floatTexts.length; n++) freeFloatText(floatTexts[n]);

  enemies = []; bullets = []; xpOrbs = []; particles = []; floatTexts = [];
  wave = 1; waveTimer = 0; spawnTimer = 0; gameTime = 0; kills = 0;
  screenShake = 0;
  camX = WORLD_W / 2 - W / 2; camY = WORLD_H / 2 - H / 2;
  lastAtk = 0;
  updateHUD(); updateSkillBar();
}

// ==================== HUD ====================
function updateHUD() {
  var hpBar = document.getElementById("hp-bar");
  var hpText = document.getElementById("hp-text");
  var xpBar = document.getElementById("xp-bar");
  var lvlText = document.getElementById("lvl-text");
  if (hpBar) hpBar.style.width = (Math.max(0, player.hp) / player.maxHp * 100) + "%";
  if (hpText) hpText.textContent = Math.ceil(Math.max(0, player.hp)) + "/" + player.maxHp;
  if (xpBar) xpBar.style.width = (player.xp / player.xpToNext * 100) + "%";
  if (lvlText) lvlText.textContent = "Lv." + player.level;
  var waveHud = document.getElementById("wave-hud");
  var timeHud = document.getElementById("time-hud");
  var killHud = document.getElementById("kill-hud");
  if (waveHud) waveHud.textContent = wave;
  if (timeHud) timeHud.textContent = formatTime(gameTime);
  if (killHud) killHud.textContent = "KILLS " + kills;
}

function updateSkillBar() {
  var bar = document.getElementById("skill-bar");
  if (!bar) return;
  bar.innerHTML = "";
  ALL_SKILLS.forEach(function(s) {
    var lvl = player.skills[s.id];
    if (lvl) {
      var tag = document.createElement("div");
      tag.className = "skill-tag";
      var iconCanvas = Tex.skill(s.id, s.color);
      iconCanvas.style.width = "24px"; iconCanvas.style.height = "24px";

      lvlSpan.className = "sl"; lvlSpan.textContent = lvl;
      tag.appendChild(nameSpan); tag.appendChild(lvlSpan);
      bar.appendChild(tag);
    }
  });
}

var ENEMY_TYPES = [
  {id:"skeleton",r:12,hp:32,speed:1.15,dmg:12,color:"#b0a898",xp:5,score:1},
  {id:"demon",r:11,hp:20,speed:1.9,dmg:9,color:"#701818",xp:6,score:1},
  {id:"brute",r:23,hp:90,speed:0.55,dmg:22,color:"#282838",xp:16,score:2},
  {id:"ghost",r:11,hp:18,speed:1.5,dmg:8,color:"#3a5a7a",xp:6,score:1,ghost:true},
  {id:"splitter",r:15,hp:42,speed:1.05,dmg:13,color:"#5a3a18",xp:8,score:1,split:true},
  {id:"elite",r:28,hp:200,speed:0.42,dmg:35,color:"#100810",xp:32,score:3,elite:true}
];

function spawnEnemy() {
  if (enemies.length >= MAX_ENEMIES) return;
  var maxIdx = Math.min(ENEMY_TYPES.length - 1, Math.floor(wave / 2.5));
  var pool = ENEMY_TYPES.slice(0, maxIdx + 1);
  var t = pool[Math.floor(Math.random() * pool.length)];
  var angle = Math.random() * Math.PI * 2;
  var spawnDist = Math.max(W, H) * 0.6 + rand(0, 200);
  var ex = player.x + Math.cos(angle) * spawnDist;
  var ey = player.y + Math.sin(angle) * spawnDist;
  var hpMult = 1 + wave * 0.12 + (t.elite ? wave * 0.06 : 0);
  enemies.push({
    x: ex, y: ey, type: t.id, r: t.r,
    hp: Math.round(t.hp * hpMult), maxHp: Math.round(t.hp * hpMult),
    speed: t.speed, dmg: t.dmg, color: t.color, xp: t.xp, score: t.score,
    ghost: t.ghost || false, split: t.split || false, elite: t.elite || false,
    hitFlash: 0, animPhase: Math.random() * Math.PI * 2,
    slowTimer: 0, burnTimer: 0, burnDmg: 0, spawnTime: gameTime,
    deathTimer: 0, dying: false
  });
}

function spawnXp(x, y, amount) {
  if (xpOrbs.length >= MAX_XP) return;
  for (var i = 0; i < amount; i++) {
    var o = getXpOrb();
    o.x = x + rand(-20, 20); o.y = y + rand(-20, 20);
    o.vx = rand(-2, 2); o.vy = rand(-2, 2);
    o.amount = 1; o.r = 3.5; o.magnet = false; o.life = 1;
    xpOrbs.push(o);
  }
}

function spawnParticles(x, y, color, count, speed, spread) {
  if (particles.length >= MAX_PARTICLES) return;
  spread = spread || Math.PI * 2;
  for (var i = 0; i < count; i++) {
    var a = rand(0, spread) - spread / 2 + Math.PI;
    var s = rand(0.5, speed);
    var p = getParticle();
    p.x = x; p.y = y;
    p.vx = Math.cos(a) * s; p.vy = Math.sin(a) * s;
    p.life = 1; p.decay = rand(0.012, 0.035);
    p.size = rand(1, 4.5); p.color = color;
    particles.push(p);
  }
}

function addFloatText(x, y, text, color, size) {
  size = size || 13;
  var t = getFloatText();
  t.x = x; t.y = y; t.text = text; t.color = color;
  t.size = size; t.life = 1; t.vy = -1.1; t.ox = rand(-14, 14);
  floatTexts.push(t);
}

// ==================== UPGRADE / WAVE / GAMEOVER ====================
function showUpgrade() {
  paused = true;
  screens.upgrade.style.display = "flex";
  var container = document.getElementById("upgrade-grid");
  if (!container) return;
  container.innerHTML = "";
  var pool = ALL_SKILLS.filter(function(s) { return (player.skills[s.id] || 0) < 5; });
  var picks = [];
  while (picks.length < 3 && pool.length > 0) {
    var idx = Math.floor(Math.random() * pool.length);
    picks.push(pool.splice(idx, 1)[0]);
  }
  picks.forEach(function(s) {
    var card = document.createElement("div");
    card.className = "up-card";
    card.style.setProperty("--accent", s.accent);
    card.style.setProperty("--glow", s.glow);
    var lvl = player.skills[s.id] || 0;
    var iconC = Tex.skill(s.id, s.color);
    iconC.style.width = "44px"; iconC.style.height = "44px";
    var lvlBadge = lvl ? '<div class="up-lvl">Lv.' + (lvl + 1) + '</div>' : '<div style="height:25px;"></div>';
    card.innerHTML = '<div class="up-img">' + iconC.outerHTML + '</div><div class="up-name">' + s.name + '</div>' + lvlBadge + '<div class="up-desc">' + s.desc + '</div>';
    card.addEventListener("click", function() {
      s.apply(player);
      player.skills[s.id] = (player.skills[s.id] || 0) + 1;
      screens.upgrade.style.display = "none";
      paused = false;
      updateSkillBar(); updateHUD();
    });
    container.appendChild(card);
  });
}

function showWaveBanner() {
  var banner = document.getElementById("wave-banner-text");
  if (!banner) return;
  banner.textContent = "WAVE " + wave;
  screens.waveBanner.style.display = "block";
  banner.style.transition = "none";
  banner.style.opacity = "1"; banner.style.transform = "scale(1)";

    banner.style.transition = "all 2s cubic-bezier(0.4,0,0.2,1)";

  });

}

function gameOver() {
  running = false;
  screens.hud.style.display = "none";
  screens.joystick.style.display = "none";
  screens.skillbar.style.display = "none";
  screens.cheatToggle.style.display = "none";
  screens.over.style.display = "flex";
  var stats = document.getElementById("over-grid");
  if (stats) {
    stats.innerHTML = '<div class="over-cell"><div class="cl">存活时间</div><div class="cv">' + formatTime(gameTime) + '</div></div>' +
      '<div class="over-cell"><div class="cl">到达波次</div><div class="cv">' + wave + '</div></div>' +
      '<div class="over-cell"><div class="cl">击杀数量</div><div class="cv">' + kills + '</div></div>' +
      '<div class="over-cell"><div class="cl">到达等级</div><div class="cv">' + player.level + '</div></div>';
  }
  // Save high score
  try {
    var best = JSON.parse(localStorage.getItem('abyss_best') || '{}');
    if (!best.kills || kills > best.kills) best.kills = kills;
    if (!best.wave || wave > best.wave) best.wave = wave;
    if (!best.time || gameTime > best.time) best.time = gameTime;
    localStorage.setItem('abyss_best', JSON.stringify(best));
  } catch(e) {}
}

// ==================== DRAWING ====================
function drawShadow(ctx, x, y, r, alpha) {
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.fillStyle = "#000";
  ctx.beginPath();
  ctx.ellipse(x, y + r * 0.35, r * 0.6, r * 0.2, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

function drawPlayer(ctx, px, py, pr, facing, walk, isHit) {
  var bob = Math.sin(walk) * 3;
  var sx = px, sy = py + bob;
  drawShadow(ctx, sx, sy, pr, 0.35);
  ctx.save(); ctx.translate(sx, sy); ctx.rotate(facing);

  // Aura glow
  var glow = ctx.createRadialGradient(0, 0, pr * 0.5, 0, 0, pr * 2);
  glow.addColorStop(0, "rgba(180,60,60,0.12)");
  glow.addColorStop(1, "transparent");
  ctx.fillStyle = glow; ctx.beginPath(); ctx.arc(0, 0, pr * 2, 0, Math.PI * 2); ctx.fill();

  // Body
  ctx.fillStyle = isHit ? "#fff" : "#1a1010";
  ctx.beginPath(); ctx.arc(0, 0, pr, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = isHit ? "#ddd" : "#2a1a1a";
  ctx.beginPath(); ctx.arc(0, 0, pr * 0.82, 0, Math.PI * 2); ctx.fill();

  // Armor detail
  ctx.strokeStyle = isHit ? "#fff" : "#7b5a2a";
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(0, 0, pr * 0.6, 0, Math.PI * 2); ctx.stroke();

  // Eye glow
  var eg = ctx.createRadialGradient(pr * 0.3, -pr * 0.1, 0, pr * 0.3, -pr * 0.1, pr * 0.5);
  eg.addColorStop(0, "rgba(255,60,60,0.95)");
  eg.addColorStop(1, "transparent");
  ctx.fillStyle = eg; ctx.beginPath(); ctx.arc(pr * 0.3, -pr * 0.1, pr * 0.5, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = "#ff3333"; ctx.beginPath(); ctx.arc(pr * 0.35, -pr * 0.05, 3.5, 0, Math.PI * 2); ctx.fill();

  // Weapon (sword)
  ctx.save(); ctx.translate(pr * 0.7, pr * 0.25); ctx.rotate(-0.2);
  ctx.fillStyle = isHit ? "#fff" : "#b0b0b0";
  ctx.beginPath(); ctx.moveTo(0, -3); ctx.lineTo(24, 0); ctx.lineTo(0, 3); ctx.fill();
  ctx.strokeStyle = "rgba(200,60,60,0.4)"; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(0, -3); ctx.lineTo(24, 0); ctx.stroke();
  ctx.fillStyle = "#5a3520"; ctx.fillRect(-4, -2, 6, 4);
  ctx.restore();

  // Pulse ring
  ctx.strokeStyle = "rgba(180,60,60,0.08)";
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(0, 0, pr + 8 + Math.sin(globalTime * 0.003) * 4, 0, Math.PI * 2); ctx.stroke();

  ctx.restore();
}

function drawEnemy(ctx, e, px, py) {
  var sx = e.x, sy = e.y;
  var flash = e.hitFlash > 0;
  var alpha = e.ghost ? 0.5 : 1;

  drawShadow(ctx, sx, sy, e.r, e.ghost ? 0.1 : 0.3);
  ctx.save(); ctx.translate(sx, sy); ctx.globalAlpha = alpha;

  if (e.dying) {
    ctx.globalAlpha = alpha * Math.max(0, e.deathTimer);
    ctx.scale(1 + (1 - e.deathTimer) * 0.3, 1 + (1 - e.deathTimer) * 0.3);
  }

  if (e.type === "skeleton") {
    ctx.fillStyle = flash ? "#fff" : "#c0b8a0";
    ctx.beginPath(); ctx.arc(0, 0, e.r, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = flash ? "#fff" : "#08080c";
    var look = angleBetween(e, {x: px, y: py});
    ctx.beginPath(); ctx.arc(Math.cos(look) * e.r * 0.3 - 1.5, Math.sin(look) * e.r * 0.3 - 1, e.r * 0.18, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(Math.cos(look) * e.r * 0.3 + 1.5, Math.sin(look) * e.r * 0.3 - 1, e.r * 0.18, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = "#888"; ctx.fillRect(-1.5, e.r * 0.15, 3, 1.5);
  } else if (e.type === "demon") {
    ctx.fillStyle = flash ? "#fff" : "#801818";
    var spikes = 6; ctx.beginPath();
    for (var i = 0; i < spikes * 2; i++) {
      var a = (i / (spikes * 2)) * Math.PI * 2 + e.animPhase;
      var rr = i % 2 === 0 ? e.r : e.r * 0.5;
      if (i === 0) ctx.moveTo(Math.cos(a) * rr, Math.sin(a) * rr);
      else ctx.lineTo(Math.cos(a) * rr, Math.sin(a) * rr);
    }
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = flash ? "#fff" : "#5a1010";
    ctx.beginPath(); ctx.moveTo(-e.r * 0.5, -e.r * 0.3); ctx.lineTo(-e.r * 0.8, -e.r * 1.1); ctx.lineTo(-e.r * 0.15, -e.r * 0.4); ctx.fill();
    ctx.beginPath(); ctx.moveTo(e.r * 0.5, -e.r * 0.3); ctx.lineTo(e.r * 0.8, -e.r * 1.1); ctx.lineTo(e.r * 0.15, -e.r * 0.4); ctx.fill();
    var look2 = angleBetween(e, {x: px, y: py});
    ctx.fillStyle = "#ffaa00";
    ctx.beginPath(); ctx.arc(Math.cos(look2) * e.r * 0.22 - 1.5, Math.sin(look2) * e.r * 0.22, 2, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(Math.cos(look2) * e.r * 0.22 + 1.5, Math.sin(look2) * e.r * 0.22, 2, 0, Math.PI * 2); ctx.fill();
  } else if (e.type === "ghost") {
    ctx.fillStyle = flash ? "#fff" : "#4a6a8a";
    ctx.beginPath(); ctx.arc(0, 0, e.r, Math.PI, 0);
    ctx.lineTo(e.r, e.r * 0.7); ctx.lineTo(e.r * 0.5, e.r * 0.4); ctx.lineTo(0, e.r * 0.7); ctx.lineTo(-e.r * 0.5, e.r * 0.4); ctx.lineTo(-e.r, e.r * 0.7); ctx.closePath(); ctx.fill();
    ctx.fillStyle = "#88ccff";
    ctx.beginPath(); ctx.arc(-2, -2, 1.5, 0, Math.PI * 2); ctx.arc(2, -2, 1.5, 0, Math.PI * 2); ctx.fill();
  } else if (e.type === "brute") {
    ctx.fillStyle = flash ? "#fff" : "#303040";
    ctx.beginPath(); ctx.arc(0, 0, e.r, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = flash ? "#fff" : "#5a5a6a";
    ctx.lineWidth = 2.5; ctx.beginPath(); ctx.arc(0, 0, e.r * 0.65, 0, Math.PI * 2); ctx.stroke();
    for (var j = 0; j < 4; j++) {
      var a3 = (j / 4) * Math.PI * 2;
      ctx.fillStyle = flash ? "#fff" : "#1a1a28";
      ctx.beginPath(); ctx.moveTo(Math.cos(a3) * e.r * 0.7, Math.sin(a3) * e.r * 0.7);
      ctx.lineTo(Math.cos(a3) * e.r * 1.2, Math.sin(a3) * e.r * 1.2);
      ctx.lineTo(Math.cos(a3 + 0.2) * e.r * 0.7, Math.sin(a3 + 0.2) * e.r * 0.7); ctx.fill();
    }
  } else if (e.type === "splitter") {
    ctx.fillStyle = flash ? "#fff" : "#6a4a20";
    var spikes2 = 5; ctx.beginPath();
    for (var k = 0; k < spikes2 * 2; k++) {
      var a4 = (k / (spikes2 * 2)) * Math.PI * 2 + e.animPhase * 0.5;
      var rr2 = k % 2 === 0 ? e.r : e.r * 0.48;
      if (k === 0) ctx.moveTo(Math.cos(a4) * rr2, Math.sin(a4) * rr2);
      else ctx.lineTo(Math.cos(a4) * rr2, Math.sin(a4) * rr2);
    }
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = "#902818"; ctx.beginPath(); ctx.arc(0, 0, e.r * 0.38, 0, Math.PI * 2); ctx.fill();
  } else if (e.type === "elite") {
    ctx.fillStyle = flash ? "#fff" : "#140a14";
    ctx.beginPath(); ctx.arc(0, 0, e.r, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = flash ? "#fff" : "#7b5a2a";
    for (var m = -2; m <= 2; m++) {
      ctx.beginPath(); ctx.moveTo(m * 5, -e.r + 2); ctx.lineTo(m * 5 + (m > 0 ? 3 : -3), -e.r - 7); ctx.lineTo(m * 5 + (m > 0 ? -3 : 3), -e.r - 7); ctx.closePath(); ctx.fill();
    }
    ctx.strokeStyle = "rgba(160,30,30,0.25)";
    ctx.lineWidth = 2.5;
    ctx.beginPath(); ctx.arc(0, 0, e.r + 6 + Math.sin(globalTime * 0.004) * 3, 0, Math.PI * 2); ctx.stroke();
    var look3 = angleBetween(e, {x: px, y: py});
    ctx.fillStyle = "#ff0000"; ctx.shadowColor = "#ff0000"; ctx.shadowBlur = 12;
    ctx.beginPath(); ctx.arc(Math.cos(look3) * e.r * 0.28 - 2, Math.sin(look3) * e.r * 0.28, 2.5, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(Math.cos(look3) * e.r * 0.28 + 2, Math.sin(look3) * e.r * 0.28, 2.5, 0, Math.PI * 2); ctx.fill(); ctx.shadowBlur = 0;
  }

  // Status effects
  if (e.slowTimer > 0) {
    ctx.strokeStyle = "rgba(100,180,220,0.4)";
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(0, 0, e.r + 4, 0, Math.PI * 2); ctx.stroke();
  }
  if (e.burnTimer > 0) {
    ctx.fillStyle = "rgba(255,100,30,0.2)";
    ctx.beginPath(); ctx.arc(0, 0, e.r + 2, 0, Math.PI * 2); ctx.fill();
  }

  ctx.restore();

  // HP bar
  if (e.hp < e.maxHp && !e.dying) {
    var bw = e.r * 2.4, bx = sx - bw / 2, by = sy - e.r - 10;
    ctx.fillStyle = "rgba(0,0,0,0.6)"; ctx.fillRect(bx, by, bw, 3.5);
    var ratio = Math.max(0, e.hp) / e.maxHp;
    ctx.fillStyle = ratio > 0.5 ? "#308040" : "#a02020";
    ctx.fillRect(bx, by, bw * ratio, 3.5);
  }
}

function drawBullet(ctx, b) {
  ctx.save();
  if (b.type === "fire") {
    ctx.translate(b.x, b.y);
    var g = ctx.createRadialGradient(0, 0, 0, 0, 0, 10);
    g.addColorStop(0, "#ffee55"); g.addColorStop(0.5, "#ff4400"); g.addColorStop(1, "transparent");
    ctx.fillStyle = g; ctx.beginPath(); ctx.arc(0, 0, 10, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = "#ffaa00"; ctx.beginPath(); ctx.arc(0, 0, 4, 0, Math.PI * 2); ctx.fill();
    // Trail
    ctx.globalAlpha = 0.3;
    ctx.fillStyle = "#ff4400"; ctx.beginPath(); ctx.arc(-b.vx * 2, -b.vy * 2, 5, 0, Math.PI * 2); ctx.fill();
  } else if (b.type === "ice") {
    ctx.translate(b.x, b.y);
    ctx.fillStyle = "#88ccff"; ctx.shadowColor = "#88ccff"; ctx.shadowBlur = 12;
    ctx.beginPath();
    for (var i = 0; i < 6; i++) {
      var a = (i / 6) * Math.PI * 2;
      var r = i % 2 === 0 ? 6 : 3;
      if (i === 0) ctx.moveTo(Math.cos(a) * r, Math.sin(a) * r);
      else ctx.lineTo(Math.cos(a) * r, Math.sin(a) * r);
    }
    ctx.closePath(); ctx.fill(); ctx.shadowBlur = 0;
  } else {
    ctx.translate(b.x, b.y); ctx.rotate(Math.atan2(b.vy, b.vx));
    ctx.fillStyle = b.color; ctx.shadowColor = b.color; ctx.shadowBlur = 10;
    ctx.beginPath(); ctx.moveTo(12, 0); ctx.lineTo(-6, -4); ctx.lineTo(-6, 4); ctx.closePath(); ctx.fill();
    ctx.shadowBlur = 0;
    ctx.fillStyle = b.color + "20";
    ctx.beginPath(); ctx.arc(-8, 0, 4, 0, Math.PI * 2); ctx.fill();
    // Trail
    ctx.globalAlpha = 0.2;
    ctx.fillStyle = b.color;
    ctx.beginPath(); ctx.ellipse(-10, 0, 8, 3, 0, 0, Math.PI * 2); ctx.fill();
  }
  ctx.restore();
}

function drawXp(ctx, o) {
  var pulse = 0.5 + Math.sin(globalTime * 0.003 + o.x) * 0.5;
  ctx.save(); ctx.globalAlpha = 0.6 + pulse * 0.4;
  var g = ctx.createRadialGradient(o.x, o.y, 0, o.x, o.y, o.r * 4);
  g.addColorStop(0, "#7030c0"); g.addColorStop(0.6, "#401880"); g.addColorStop(1, "transparent");
  ctx.fillStyle = g; ctx.beginPath(); ctx.arc(o.x, o.y, o.r * 4, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = "#a070e0"; ctx.beginPath(); ctx.arc(o.x, o.y, o.r, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = "#d0b0ff"; ctx.beginPath(); ctx.arc(o.x, o.y, o.r * 0.4, 0, Math.PI * 2); ctx.fill();
  ctx.restore();
}

// ==================== GROUND / ENVIRONMENT ====================
var groundPattern = null;
function initGroundPattern() {
  var pc = document.createElement("canvas");
  pc.width = 200; pc.height = 200;
  var px = pc.getContext("2d");
  px.fillStyle = "#0c0c14"; px.fillRect(0, 0, 200, 200);
  // Subtle grid
  px.strokeStyle = "rgba(140,30,30,0.03)";
  px.lineWidth = 1;
  for (var i = 0; i <= 200; i += 50) {
    px.beginPath(); px.moveTo(i, 0); px.lineTo(i, 200); px.stroke();
    px.beginPath(); px.moveTo(0, i); px.lineTo(200, i); px.stroke();
  }
  // Random cracks
  for (var j = 0; j < 5; j++) {
    px.strokeStyle = "rgba(255,255,255,0.015)";
    px.beginPath(); px.moveTo(rand(0, 200), rand(0, 200));
    px.lineTo(rand(0, 200), rand(0, 200)); px.stroke();
  }
  groundPattern = ctx.createPattern(pc, "repeat");
}

function drawGround(ctx2) {
  ctx2.fillStyle = "#0a0a12"; ctx2.fillRect(0, 0, W, H);
  if (!groundPattern) initGroundPattern();
  ctx2.save(); ctx2.translate(-camX % 200, -camY % 200);
  ctx2.fillStyle = groundPattern; ctx2.fillRect(camX - 200, camY - 200, W + 400, H + 400);
  ctx2.restore();

  ctx2.save(); ctx2.translate(-camX, -camY);
  // World border
  ctx2.strokeStyle = "rgba(140,30,30,0.12)"; ctx2.lineWidth = 3;
  ctx2.strokeRect(0, 0, WORLD_W, WORLD_H);
  ctx2.strokeStyle = "rgba(140,30,30,0.05)"; ctx2.lineWidth = 1;
  ctx2.strokeRect(-4, -4, WORLD_W + 8, WORLD_H + 8);

  // Decorative rocks
  for (var i = 0; i < 80; i++) {
    var rx = ((i * 137.5) % WORLD_W);
    var ry = ((i * 293.1) % WORLD_H);
    if (rx < camX - 80 || rx > camX + W + 80 || ry < camY - 80 || ry > camY + H + 80) continue;
    var rs = 3 + (i % 7);
    ctx2.fillStyle = "rgba(20,14,22,0.6)";
    ctx2.beginPath(); ctx2.arc(rx, ry, rs, 0, Math.PI * 2); ctx2.fill();
    ctx2.fillStyle = "rgba(40,30,35,0.3)";
    ctx2.beginPath(); ctx2.arc(rx - 1, ry - 1, rs * 0.6, 0, Math.PI * 2); ctx2.fill();
  }
  ctx2.restore();
}

// ==================== UPDATE ====================
function update(dt) {
  if (!running || paused) return;
  gameTime += dt; globalTime += dt;

  // Regen
  if (player.regen > 0) {
    player.regenTimer += dt;
    if (player.regenTimer > 1000) {
      player.hp = Math.min(player.maxHp, player.hp + player.regen);
      player.regenTimer = 0;
    }
  }

  // Combo decay
  if (player.comboTimer > 0) {
    player.comboTimer -= dt;
    if (player.comboTimer <= 0) player.combo = 0;
  }

  // Movement
  var mx = 0, my = 0;
  if (joyActive) {
    var len = Math.sqrt(joyDX * joyDX + joyDY * joyDY);
    if (len > 3) { mx = joyDX / len; my = joyDY / len; }
  } else {
    if (keys["ArrowLeft"] || keys["a"] || keys["A"]) mx = -1;
    if (keys["ArrowRight"] || keys["d"] || keys["D"]) mx = 1;
    if (keys["ArrowUp"] || keys["w"] || keys["W"]) my = -1;
    if (keys["ArrowDown"] || keys["s"] || keys["S"]) my = 1;
    if (mx !== 0 && my !== 0) { mx *= 0.707; my *= 0.707; }
  }
  player.x += mx * player.speed;
  player.y += my * player.speed;
  player.x = clamp(player.x, player.r, WORLD_W - player.r);
  player.y = clamp(player.y, player.r, WORLD_H - player.r);
  if (mx !== 0 || my !== 0) {
    player.facing = Math.atan2(my, mx);
    player.walkCycle += dt * 0.008;
  }

  // Camera
  var targetCamX = player.x - W / 2, targetCamY = player.y - H / 2;
  camX += (targetCamX - camX) * 0.06;
  camY += (targetCamY - camY) * 0.06;

  // Attack
  var now = performance.now();
  if (now - lastAtk > player.atkSpd) {
    var nearest = null, minDist = player.range;
    // Use spatial hash for enemy query
    var nearby = getNearby(player.x, player.y, player.range);
    for (var i = 0; i < nearby.length; i++) {
      var e = nearby[i];
      if (e.dying) continue;
      var d = dist(player, e);
      if (d < minDist) { minDist = d; nearest = e; }
    }
    if (nearest) {
      var angle = angleBetween(player, nearest);
      for (var j = 0; j < player.projCount; j++) {
        var spread = player.projCount > 1 ? (j - (player.projCount - 1) / 2) * 0.09 : 0;
        var a = angle + spread;
        var bType = player.skills.fire ? "fire" : (player.skills.frost ? "ice" : "sword");
        var bColor = bType === "fire" ? "#ff6622" : (bType === "ice" ? "#88ccff" : "#c0c0c0");
        var b = getBullet();
        b.x = player.x; b.y = player.y;
        b.vx = Math.cos(a) * 10; b.vy = Math.sin(a) * 10;
        b.dmg = player.atk; b.pierce = player.pierce;
        b.hit = []; b.r = 3.5; b.color = bColor; b.type = bType;
        b.bounce = player.skills.bounce || 0; b.bounced = 0;
        bullets.push(b);
      }
      lastAtk = now;
    }
  }

  // Wave / Spawn
  waveTimer += dt;
  var spawnRate = Math.max(45, 580 - wave * 22);
  spawnTimer += dt;
  if (spawnTimer > spawnRate) { spawnEnemy(); spawnTimer = 0; }
  if (waveTimer > waveDuration) {
    wave++; waveTimer = 0;
    waveDuration = Math.min(70000, 50000 + wave * 3000);
    showWaveBanner();
    spawnParticles(player.x, player.y, "#d4a030", 50, 7);
  }

  // Build spatial grid for enemies
  clearGrid();
  for (var eIdx = 0; eIdx < enemies.length; eIdx++) {
    if (!enemies[eIdx].dying) addToGrid(enemies[eIdx]);
  }

  // Update enemies
  for (var ei = enemies.length - 1; ei >= 0; ei--) {
    var e = enemies[ei];
    if (e.dying) {
      e.deathTimer -= dt * 0.002;
      if (e.deathTimer <= 0) { enemies.splice(ei, 1); continue; }
      continue;
    }
    var spd = e.speed;
    if (e.slowTimer > 0) { spd *= Math.max(0.25, 1 - (player.skills.frost || 0)); e.slowTimer -= dt; }
    if (e.burnTimer > 0) {
      e.burnTimer -= dt;
      if (Math.floor(e.burnTimer / 500) !== Math.floor((e.burnTimer + dt) / 500)) {
        e.hp -= e.burnDmg;
        addFloatText(e.x, e.y - 16, "-" + e.burnDmg, "#ff6622", 11);
        spawnParticles(e.x, e.y, "#ff6622", 2, 1);
      }
    }
    var edx = player.x - e.x, edy = player.y - e.y;
    var ed = Math.sqrt(edx * edx + edy * edy);
    if (ed > 0) { e.x += (edx / ed) * spd; e.y += (edy / ed) * spd; }
    e.animPhase += 0.018;
    if (e.hitFlash > 0) e.hitFlash -= dt;

    // Player collision
    if (ed < player.r + e.r && player.invincible <= 0 && !cheats.god) {
      player.hp -= e.dmg;
      player.invincible = 500;
      screenShake = 14;
      spawnParticles(player.x, player.y, "#c03030", 24, 5);
      addFloatText(player.x, player.y - 28, "-" + e.dmg, "#ff4444", 16);
      // Haptic feedback if available
      if (window.navigator && window.navigator.vibrate) window.navigator.vibrate(50);
      if (player.hp <= 0) { gameOver(); return; }
    }
  }

  // Update bullets
  for (var bi = bullets.length - 1; bi >= 0; bi--) {
    var b = bullets[bi];
    b.x += b.vx; b.y += b.vy;
    var removed = false;

    // Query nearby enemies via spatial hash
    var nearEnemies = getNearby(b.x, b.y, 60);
    for (var ej = nearEnemies.length - 1; ej >= 0; ej--) {
      var e2 = nearEnemies[ej];
      if (e2.dying) continue;
      if (Math.sqrt((b.x - e2.x) ** 2 + (b.y - e2.y) ** 2) < e2.r + b.r + 2 && !b.hit.includes(e2)) {
        b.hit.push(e2);
        var dmg = b.dmg;
        if (cheats.oneshot) dmg = e2.maxHp + 999;
        else if (player.critChance > 0 && Math.random() < player.critChance) {
          dmg = Math.round(dmg * player.critDmg);
          addFloatText(e2.x, e2.y - 24, "CRIT!", "#d4a030", 17);
          spawnParticles(e2.x, e2.y, "#d4a030", 10, 4);
        }
        e2.hp -= dmg;
        e2.hitFlash = 100;
        if (player.skills.frost) e2.slowTimer = 1600;
        if (player.skills.fire) { e2.burnTimer = 2200; e2.burnDmg = Math.max(e2.burnDmg || 0, Math.round(player.atk * 0.35)); }
        spawnParticles(b.x, b.y, "#ffffff", 6, 2.5);
        addFloatText(e2.x + rand(-10, 10), e2.y - 20, String(dmg), "#e8e0d8", 13);

        if (e2.hp <= 0) {
          // Death animation
          e2.dying = true;
          e2.deathTimer = 1;
          spawnParticles(e2.x, e2.y, e2.color, 35, 6);
          spawnParticles(e2.x, e2.y, "#ff4444", 14, 4);
          spawnXp(e2.x, e2.y, e2.xp * cheats.xpmult);
          addFloatText(e2.x, e2.y, "+" + (e2.xp * cheats.xpmult), "#a070e0", 13);
          if (player.skills.vamp) {
            player.hp = Math.min(player.maxHp, player.hp + player.skills.vamp);
            addFloatText(player.x, player.y - 32, "+" + player.skills.vamp, "#40c870", 12);
          }
          if (player.skills.explode) {
            for (var otherIdx = 0; otherIdx < enemies.length; otherIdx++) {
              var other = enemies[otherIdx];
              if (other === e2 || other.dying) continue;
              if (dist(other, e2) < 90) {
                other.hp -= Math.round(player.atk * 0.55 * player.skills.explode);
                other.hitFlash = 80;
              }
            }
            spawnParticles(e2.x, e2.y, "#e07020", 28, 7);
          }
          if (e2.split) {
            for (var sk = 0; sk < 2; sk++) {
              if (enemies.length >= MAX_ENEMIES) break;
              enemies.push({
                x: e2.x + rand(-28, 28), y: e2.y + rand(-28, 28),
                type: "skeleton", r: 8, hp: 14, maxHp: 14, speed: 1.8, dmg: 6,
                color: "#908060", xp: 2, score: 1, hitFlash: 0,
                animPhase: rand(0, Math.PI * 2), slowTimer: 0, burnTimer: 0, burnDmg: 0,
                spawnTime: gameTime, dying: false, deathTimer: 0
              });
            }
          }
          kills++;
          player.combo++;
          player.comboTimer = 2000;
          if (player.combo > 1 && player.combo % 10 === 0) {
            addFloatText(player.x, player.y - 50, player.combo + " COMBO!", "#ffdd33", 18);
          }
        }
        if (b.hit.length > b.pierce + 1) { bullets.splice(bi, 1); freeBullet(b); removed = true; break; }
      }
    }
    if (removed) continue;

    // Bounce
    if (!removed && b.bounce > 0 && b.bounced < b.bounce) {
      var bounced = false;
      if (b.x < 60 || b.x > WORLD_W - 60) { b.vx *= -1; bounced = true; }
      if (b.y < 60 || b.y > WORLD_H - 60) { b.vy *= -1; bounced = true; }
      if (bounced) { b.bounced++; b.hit = []; }
    }
    if (!removed && (b.x < -150 || b.x > WORLD_W + 150 || b.y < -150 || b.y > WORLD_H + 150)) {
      bullets.splice(bi, 1); freeBullet(b);
    }
  }

  // Update XP
  for (var xi = xpOrbs.length - 1; xi >= 0; xi--) {
    var o = xpOrbs[xi];
    var d = dist(o, player);
    if (d < player.magnetRange || o.magnet) {
      o.magnet = true;
      var dx = player.x - o.x, dy = player.y - o.y;
      var dd = Math.sqrt(dx * dx + dy * dy);
      if (dd > 0) { o.vx += dx / dd * 0.8; o.vy += dy / dd * 0.8; }
    }
    o.x += o.vx; o.y += o.vy;
    o.vx *= 0.92; o.vy *= 0.92;
    if (d < player.r + o.r + 8) {
      player.xp += o.amount;
      if (player.xp >= player.xpToNext) {
        player.xp -= player.xpToNext;
        player.level++;
        player.xpToNext = Math.round(player.xpToNext * 1.4);
        addFloatText(player.x, player.y - 60, "LEVEL UP!", "#d4a030", 20);
        spawnParticles(player.x, player.y, "#d4a030", 32, 5);
        showUpgrade();
      }
      xpOrbs.splice(xi, 1); freeXpOrb(o);
    }
  }

  // Update particles
  if (particles.length > MAX_PARTICLES) {
    for (var pi2 = 0; pi2 < particles.length - MAX_PARTICLES; pi2++) freeParticle(particles[pi2]);
    particles.splice(0, particles.length - MAX_PARTICLES);
  }
  for (var pi = particles.length - 1; pi >= 0; pi--) {
    var p = particles[pi];
    p.x += p.vx; p.y += p.vy;
    p.vx *= 0.96; p.vy *= 0.96;
    p.life -= p.decay;
    if (p.life <= 0) { freeParticle(p); particles.splice(pi, 1); }
  }

  // Update float texts
  for (var ti = floatTexts.length - 1; ti >= 0; ti--) {
    var t = floatTexts[ti];
    t.y += t.vy;
    t.life -= 0.014;
    if (t.life <= 0) { freeFloatText(t); floatTexts.splice(ti, 1); }
  }

  if (player.invincible > 0) player.invincible -= dt;
  if (screenShake > 0) { screenShake *= 0.85; if (screenShake < 0.3) screenShake = 0; }
  if (frameCount % 6 === 0) updateHUD();
}

// ==================== DRAW ====================
function draw() {
  ctx.save();
  if (screenShake > 0) ctx.translate((Math.random() - 0.5) * screenShake, (Math.random() - 0.5) * screenShake);
  drawGround(ctx);
  ctx.save(); ctx.translate(-camX, -camY);

  // XP orbs (below entities)
  for (var oi = 0; oi < xpOrbs.length; oi++) drawXp(ctx, xpOrbs[oi]);

  // Enemies
  for (var ei2 = 0; ei2 < enemies.length; ei2++) drawEnemy(ctx, enemies[ei2], player.x, player.y);

  // Bullets
  for (var bi2 = 0; bi2 < bullets.length; bi2++) drawBullet(ctx, bullets[bi2]);

  // Player
  var isHit = player.invincible > 0 && Math.floor(Date.now() / 65) % 2 === 1;
  drawPlayer(ctx, player.x, player.y, player.r, player.facing, player.walkCycle, isHit);

  // Particles
  for (var pi3 = 0; pi3 < particles.length; pi3++) {
    var p2 = particles[pi3];
    ctx.globalAlpha = Math.max(0, p2.life);
    ctx.fillStyle = p2.color;
    ctx.beginPath(); ctx.arc(p2.x, p2.y, p2.size * p2.life, 0, Math.PI * 2); ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Float texts
  for (var ti2 = 0; ti2 < floatTexts.length; ti2++) {
    var t2 = floatTexts[ti2];
    ctx.globalAlpha = Math.min(1, t2.life * 2);
    ctx.font = "700 " + t2.size + "px sans-serif";
    ctx.fillStyle = t2.color;
    ctx.textAlign = "center";
    ctx.shadowColor = "rgba(0,0,0,0.9)"; ctx.shadowBlur = 5;
    ctx.fillText(t2.text, t2.x + t2.ox, t2.y);
    ctx.shadowBlur = 0;
  }
  ctx.globalAlpha = 1;
  ctx.restore();

  // Range indicator
  ctx.strokeStyle = "rgba(180,60,60,0.04)";
  ctx.lineWidth = 1; ctx.setLineDash([4, 8]);
  ctx.beginPath(); ctx.arc(player.x - camX, player.y - camY, player.range, 0, Math.PI * 2); ctx.stroke();
  ctx.setLineDash([]);

  // Vignette
  var vig = ctx.createRadialGradient(W / 2, H / 2, H * 0.3, W / 2, H / 2, H * 0.85);
  vig.addColorStop(0, "transparent"); vig.addColorStop(1, "rgba(4,3,5,0.45)");
  ctx.fillStyle = vig; ctx.fillRect(0, 0, W, H);

  ctx.restore();
}

// ==================== LOOP ====================
function loop(ts) {
  if (!lastTime) lastTime = ts;
  var dt = Math.min(ts - lastTime, 50);
  lastTime = ts;
  frameCount++;
  update(dt);
  draw();
  loopId = requestAnimationFrame(loop);
}

// ==================== INPUT EVENTS ====================
// Keyboard
window.addEventListener("keydown", function(e) {
  keys[e.key] = true;
  if (e.key === "`" || e.key === "~") {
    e.preventDefault();
    if (screens.cheatPanel.style.display === "block") {
      screens.cheatPanel.style.display = "none";
      if (running) paused = false;
    } else {
      screens.cheatPanel.style.display = "block";
      if (running) paused = true;
    }
  }
});
window.addEventListener("keyup", function(e) { keys[e.key] = false; });

// Touch / Joystick
var gameWrap = document.getElementById("game-wrap");

gameWrap.addEventListener("touchstart", function(e) {
  if (e.target.closest("#cheat-panel") || e.target.closest(".btn-main") || 
      e.target.closest(".up-card") || e.target.closest("#cheat-toggle")) return;
  if (!running || paused) return;
  for (var i = 0; i < e.changedTouches.length; i++) {
    var t = e.changedTouches[i];
    if (joyActive && joyID !== null) continue;
    joyActive = true; joyID = t.identifier;
    var pos = getPos(t.clientX, t.clientY);
    joyBaseX = pos.x; joyBaseY = pos.y;
    joyDX = 0; joyDY = 0;
    screens.joystick.style.display = "block";
    joyBase.style.left = joyBaseX + "px"; joyBase.style.top = joyBaseY + "px";
    joyKnob.style.left = joyBaseX + "px"; joyKnob.style.top = joyBaseY + "px";
    break;
  }
}, {passive: false});

gameWrap.addEventListener("touchmove", function(e) {
  if (!joyActive) return;
  for (var i = 0; i < e.changedTouches.length; i++) {
    var t = e.changedTouches[i];
    if (t.identifier !== joyID) continue;
    e.preventDefault();
    var pos = getPos(t.clientX, t.clientY);
    var dx = pos.x - joyBaseX, dy = pos.y - joyBaseY;
    var len = Math.sqrt(dx * dx + dy * dy);
    if (len > joyMax) { dx = dx / len * joyMax; dy = dy / len * joyMax; }
    joyDX = dx; joyDY = dy;
    joyKnob.style.left = (joyBaseX + dx) + "px";
    joyKnob.style.top = (joyBaseY + dy) + "px";
    break;
  }
}, {passive: false});

function endJoystick(id) {
  if (joyActive && joyID === id) {
    joyActive = false; joyID = null;
    screens.joystick.style.display = "none";
    joyDX = 0; joyDY = 0;
  }
}
gameWrap.addEventListener("touchend", function(e) {
  for (var i = 0; i < e.changedTouches.length; i++) endJoystick(e.changedTouches[i].identifier);
}, {passive: false});
gameWrap.addEventListener("touchcancel", function(e) {
  for (var i = 0; i < e.changedTouches.length; i++) endJoystick(e.changedTouches[i].identifier);
}, {passive: false});

// Mouse joystick (desktop fallback)
gameWrap.addEventListener("mousedown", function(e) {
  if (e.target.tagName === "BUTTON" || e.target.closest("#cheat-panel")) return;
  if (!running || paused) return;
  var pos = getPos(e.clientX, e.clientY);
  mouseJoy = true; joyActive = true; joyID = -1;
  joyBaseX = pos.x; joyBaseY = pos.y;
  joyDX = 0; joyDY = 0;
  screens.joystick.style.display = "block";
  joyBase.style.left = joyBaseX + "px"; joyBase.style.top = joyBaseY + "px";
  joyKnob.style.left = joyBaseX + "px"; joyKnob.style.top = joyBaseY + "px";
});
window.addEventListener("mousemove", function(e) {
  if (!mouseJoy || !joyActive) return;
  var pos = getPos(e.clientX, e.clientY);
  var dx = pos.x - joyBaseX, dy = pos.y - joyBaseY;
  var len = Math.sqrt(dx * dx + dy * dy);
  if (len > joyMax) { dx = dx / len * joyMax; dy = dy / len * joyMax; }
  joyDX = dx; joyDY = dy;
  joyKnob.style.left = (joyBaseX + dx) + "px";
  joyKnob.style.top = (joyBaseY + dy) + "px";
});
window.addEventListener("mouseup", function() {
  if (!mouseJoy) return;
  mouseJoy = false; joyActive = false; joyID = null;
  screens.joystick.style.display = "none";
  joyDX = 0; joyDY = 0;
});

// ==================== BUTTON HANDLERS ====================
// CRITICAL FIX: Multiple event types for start button to ensure it works
var startBtn = document.getElementById("start-btn");
function handleStartGame(e) {
  if (e) e.preventDefault();
  resetGame();
  running = true;
  screens.start.style.display = "none";
  screens.hud.style.display = "flex";
  screens.skillbar.style.display = "flex";
  screens.cheatToggle.style.display = "flex";
  lastTime = performance.now();
  // Hide loading if visible
  if (loadingEl) loadingEl.style.display = "none";
}
if (startBtn) {
  startBtn.addEventListener("click", handleStartGame);
  startBtn.addEventListener("touchend", function(e) {
    e.preventDefault(); // Prevent double firing on some devices
    handleStartGame(e);
  });
}

var restartBtn = document.getElementById("restart-btn");
function handleRestart(e) {
  if (e) e.preventDefault();
  resetGame();
  running = true;
  screens.over.style.display = "none";
  screens.hud.style.display = "flex";
  screens.skillbar.style.display = "flex";
  screens.cheatToggle.style.display = "flex";
  lastTime = performance.now();
}
if (restartBtn) {
  restartBtn.addEventListener("click", handleRestart);
  restartBtn.addEventListener("touchend", function(e) { e.preventDefault(); handleRestart(e); });
}

// Cheat buttons
document.querySelectorAll(".cheat-btn").forEach(function(btn) {
  btn.addEventListener("click", function() {
    var type = this.dataset.cheat;
    switch (type) {
      case "god":
        cheats.god = !cheats.god;
        this.textContent = cheats.god ? "关闭" : "开启";
        this.style.color = cheats.god ? "#40c870" : "#d4b896";
        addFloatText(player.x, player.y - 40, cheats.god ? "GOD MODE ON" : "GOD MODE OFF", "#40c870", 16);
        break;
      case "oneshot":
        cheats.oneshot = !cheats.oneshot;
        this.textContent = cheats.oneshot ? "关闭" : "开启";
        this.style.color = cheats.oneshot ? "#ff4444" : "#d4b896";
        break;
      case "xpmult":
        cheats.xpmult = cheats.xpmult === 1 ? 10 : 1;
        this.textContent = cheats.xpmult + "x";
        break;
      case "levelup":
        for (var i = 0; i < 10; i++) {
          player.level++;
          player.xpToNext = Math.round(player.xpToNext * 1.4);
        }
        player.atk = Math.round(player.atk * 1.8);
        player.maxHp += 80; player.hp = player.maxHp;
        addFloatText(player.x, player.y - 50, "LEVEL +10", "#d4a030", 18);
        spawnParticles(player.x, player.y, "#d4a030", 30, 5);
        updateHUD();
        break;
      case "wave":
        wave += 5;
        addFloatText(player.x, player.y - 50, "WAVE +" + wave, "#ff4444", 18);
        updateHUD();
        break;
      case "cooldown":
        lastAtk = 0;
        addFloatText(player.x, player.y - 40, "COOLDOWN RESET", "#40a0c8", 14);
        break;
      case "heal":
        player.hp = player.maxHp; player.invincible = 0;
        addFloatText(player.x, player.y - 40, "FULL HEAL", "#40c870", 16);
        spawnParticles(player.x, player.y, "#40c870", 20, 4);
        updateHUD();
        break;
    }
  });
});

document.getElementById("cheat-close").addEventListener("click", function() {
  screens.cheatPanel.style.display = "none";
  if (running) paused = false;
});

screens.cheatToggle.addEventListener("click", function() {
  if (screens.cheatPanel.style.display === "block") {
    screens.cheatPanel.style.display = "none";
    if (running) paused = false;
  } else {
    screens.cheatPanel.style.display = "block";
    if (running) paused = true;
  }
});

window.addEventListener("contextmenu", function(e) { e.preventDefault(); });

// ==================== INIT ====================
// Hide loading and show start screen when ready
window.addEventListener("load", function() {
  if (loadingEl) loadingEl.style.display = "none";
  // Pre-generate textures
  ALL_SKILLS.forEach(function(s) { Tex.skill(s.id, s.color); });
});

// Start render loop immediately (will show empty world until game starts)
loopId = requestAnimationFrame(loop);

})();
</script>
